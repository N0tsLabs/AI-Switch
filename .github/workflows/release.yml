name: 'publish'

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest' # for Arm based macs (M1 and above).
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest' # for Intel based macs.
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04' # for Tauri v1 you could replace this with ubuntu-20.04.
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Those targets are only used on macos runners so it's in an `if` to slightly speed up windows and linux builds.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'AI-Switch ${{ github.ref_name }}'
          releaseBody: '## 更新内容

### 新功能
- Claude Code 和 OpenCode 的配置文件切换
- GitHub Device Flow 登录（自动打开浏览器 + 复制验证码）
- 云同步配置到 GitHub 私有仓库
- 版本更新检查
- 本机配置一键导入到服务商设置
- Agent 工具页选择服务商和模型（API 配置统一在模型设置管理）

### 修复
- Token 存储兼容性（改用文件存储，修复 Windows 钥匙串问题）
- GitHub 登录后状态刷新
- Toast Context 拆分，支持 React Fast Refresh
- 配置文件应用功能
- ESLint 和 TypeScript 修复

### 构建
- Tauri 2 桌面应用，支持自动更新
- GitHub Actions CI/CD，支持 Windows、macOS、Linux

---

**Windows**: 下载 `ai-switch_x64-setup.exe` 或 `ai-switch_x64_en-US.msi`
**macOS**: 下载 `ai-switch_aarch64.dmg`（M1/M2）或 `ai-switch_x64.dmg`（Intel）
**Linux**: 下载 `ai-switch_amd64.deb`（Debian/Ubuntu）或 `ai-switch_amd64.AppImage`'
          releaseDraft: true
          prerelease: false
          generateReleaseNotes: true
          args: ${{ matrix.args }}